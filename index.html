<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GPS Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#wrap { position: relative; width: min(390px,100vw); height: min(844px,100dvh); overflow: hidden; }
canvas { display: block; }
#overlay-canvas { position: absolute; top: 0; left: 0; }
#ui {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: rgba(28,28,30,0.78);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 20px 20px 0 0;
  padding: 14px 20px max(20px,env(safe-area-inset-bottom));
  z-index: 10;
}
#ui-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
#ui-left { display: flex; align-items: center; gap: 12px; }
#ui-icon {
  width: 42px; height: 42px;
  background: rgba(255,59,48,0.18);
  border: 1px solid rgba(255,59,48,0.5);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
#ui-name { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; font-family: -apple-system,sans-serif; }
#ui-status { color: #30d158; font-size: 12px; font-weight: 500; margin-top: 2px; font-family: -apple-system,sans-serif; }
#ui-right { display: flex; align-items: center; gap: 10px; }
#ui-signal { display: flex; align-items: flex-end; gap: 2px; }
.sig-bar { width: 4px; background: #30d158; border-radius: 2px; }
.ping-dot { width: 10px; height: 10px; background: #30d158; border-radius: 50%; animation: ping 1.4s ease-in-out infinite; }
@keyframes ping { 0%,100%{box-shadow:0 0 0 0 rgba(48,209,88,0.5)} 60%{box-shadow:0 0 0 6px rgba(48,209,88,0)} }
#ui-divider { height: 0.5px; background: rgba(255,255,255,0.12); margin-bottom: 10px; }
#ui-actions { display: flex; justify-content: space-around; }
.ui-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 16px; border-radius: 10px; }
.ui-btn span { color: rgba(255,255,255,0.75); font-size: 11px; font-weight: 500; font-family: -apple-system,sans-serif; }
#ui-ctrl { display: none; margin-top: 10px; border-top: 0.5px solid rgba(255,255,255,0.12); padding-top: 10px; }
#ctrl-btns { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; }
.cbtn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.cbtn:active { background: rgba(255,255,255,0.22); }
#cbtn-play { background: rgba(28,110,243,0.85); width: 48px; height: 48px; }
#seek-row, #speed-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.clabel { color: rgba(255,255,255,0.55); font-size: 11px; font-family: -apple-system,sans-serif; white-space: nowrap; }
.cval { color: #30d158; font-size: 12px; font-weight: 600; font-family: -apple-system,sans-serif; min-width: 36px; text-align: right; }
input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }
#seek-input { accent-color: #1c6ef3; }
#speed-input { accent-color: #30d158; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="base-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
  <div id="ui">
    <div id="ui-top">
      <div id="ui-left">
        <div id="ui-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

            <circle cx="12" cy="12" r="3" fill="#ff3b30"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>

          <div class="sig-bar" style="height:17px"></div>

        <div class="ping-dot"></div>
      </div>
    </div>
    <div id="ui-divider"></div>
    <div id="ui-actions">
      <div class="ui-btn">

        <span>通知</span>
      </div>
      <div class="ui-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="rgba(255,255,255,0.85)" stroke-width="1.8"/><path d="M12 1V4M12 20V23M4.22 4.22L6.34 6.34M17.66 17.66L19.78 19.78M1 12H4M20 12H23M4.22 19.78L6.34 17.66M17.66 6.34L19.78 4.22" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>経路</span>
      </div>
      <div class="ui-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.85)" stroke-width="1.8"/><path d="M12 8V12L15 15" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>履歴</span>
      </div>
    </div>
    <div id="ui-ctrl">
      <div id="ctrl-btns">
        <button class="cbtn" onclick="seekBy(-0.1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M11 19L2 12L11 5V19Z" fill="rgba(255,255,255,0.85)"/><path d="M22 19L13 12L22 5V19Z" fill="rgba(255,255,255,0.85)"/></svg>
        </button>
        <button class="cbtn" id="cbtn-play" onclick="togglePlay()">
          <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24"><path d="M6 4L18 12L6 20V4Z" fill="white"/></svg>
          <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="4" height="16" fill="white"/><rect x="15" y="4" width="4" height="16" fill="white"/></svg>
        </button>
        <button class="cbtn" onclick="seekBy(0.1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 5L22 12L13 19V5Z" fill="rgba(255,255,255,0.85)"/><path d="M2 5L11 12L2 19V5Z" fill="rgba(255,255,255,0.85)"/></svg>
        </button>
        <button class="cbtn" onclick="resetAnim()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12A9 9 0 1 0 5.64 5.64" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/><path d="M3 7V12H8" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div id="seek-row">
        <span class="clabel">進行</span>
        <input type="range" id="seek-input" min="0" max="1000" value="0" oninput="onSeek(this.value)">
        <span class="cval" id="seek-val">0%</span>
      </div>
      <div id="speed-row">
        <span class="clabel">速度</span>
        <input type="range" id="speed-input" min="1" max="10" value="1" step="0.5" oninput="onSpeed(this.value)">
        <span class="cval" id="speed-val">x1.0</span>
      </div>
    </div>
  </div>
</div>

const bCtx = baseCanvas.getContext('2d');
const oCtx = overlayCanvas.getContext('2d');
const wrap = document.getElementById('wrap');
let scale = 1;

function resize() {
  const w = wrap.offsetWidth, h = wrap.offsetHeight;
  scale = Math.min(w / IMG_W, h / IMG_H);
  const cw = Math.round(IMG_W * scale), ch = Math.round(IMG_H * scale);

  drawBase();
}

function sc(ix, iy) { return [ix * scale, iy * scale]; }

const mapImg = new Image();

mapImg.onload = function() { drawBase(); };

function drawBase() {

}

function drawTrackerLine(progress) {
  const n = TRACKER_ROUTE.length;
  const lw = Math.max(2, scale * 4);
  const end = progress * (n - 1);
  const full = Math.floor(end);
  function drawSegs(w, color, blur) {

    oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';

    for (let i = 1; i <= full && i < n; i++) {
      const [x, y] = sc(...TRACKER_ROUTE[i]); oCtx.lineTo(x, y);
    }
    if (full < n - 1) {
      const frac = end - full;
      const [x0, y0] = sc(...TRACKER_ROUTE[full]);
      const [x1, y1] = sc(...TRACKER_ROUTE[Math.min(full + 1, n - 1)]);
      oCtx.lineTo(x0 + (x1 - x0) * frac, y0 + (y1 - y0) * frac);
    }
    oCtx.stroke(); oCtx.shadowBlur = 0;
  }

  drawSegs(lw * 5, 'rgba(100,180,255,0.55)', 14);
  drawSegs(lw * 2.5, '#cce8ff', 6);
}

  const pulse = base + base * 0.35 * Math.sin(t);
  oCtx.beginPath(); oCtx.arc(x, y, pulse * 2.8, 0, Math.PI * 2);
  oCtx.fillStyle = 'rgba(255,59,48,' + (0.07 + 0.05 * Math.sin(t)) + ')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, pulse * 1.6, 0, Math.PI * 2);
  oCtx.fillStyle = 'rgba(255,59,48,' + (0.15 + 0.07 * Math.sin(t)) + ')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, pulse, 0, Math.PI * 2);
  oCtx.fillStyle = '#1a0a0a'; oCtx.fill();
  oCtx.strokeStyle = '#ff3b30'; oCtx.lineWidth = 2.5; oCtx.stroke();
  oCtx.strokeStyle = 'rgba(255,59,48,0.5)'; oCtx.lineWidth = 1;
  oCtx.beginPath(); oCtx.moveTo(x - pulse * 1.4, y); oCtx.lineTo(x + pulse * 1.4, y); oCtx.stroke();
  oCtx.beginPath(); oCtx.moveTo(x, y - pulse * 1.4); oCtx.lineTo(x, y + pulse * 1.4); oCtx.stroke();
  oCtx.beginPath(); oCtx.arc(x, y, pulse * 0.28, 0, Math.PI * 2);
  oCtx.fillStyle = '#ff3b30'; oCtx.fill();
  const fontSize = Math.max(9, scale * 22);
  oCtx.font = 'bold ' + fontSize + 'px Courier New, monospace';
  oCtx.textAlign = 'center';
  const label = 'GPS TAG 001';
  const tw = oCtx.measureText(label).width;
  const ty = y + pulse + fontSize * 1.8;
  oCtx.fillStyle = 'rgba(0,0,0,0.65)';
  oCtx.beginPath(); oCtx.roundRect(x - tw / 2 - 6, ty - fontSize, tw + 12, fontSize * 1.4, 3); oCtx.fill();
  oCtx.strokeStyle = 'rgba(255,59,48,0.7)'; oCtx.lineWidth = 1; oCtx.stroke();
  oCtx.fillStyle = '#ff3b30'; oCtx.fillText(label, x, ty);
}

function drawTrackerDot(progress, t) {
  const n = TRACKER_ROUTE.length;
  const f = progress * (n - 1), i = Math.floor(f), fr = f - i;
  const a = TRACKER_ROUTE[i], b = TRACKER_ROUTE[Math.min(i + 1, n - 1)];
  const ix = a[0] + (b[0] - a[0]) * fr, iy = a[1] + (b[1] - a[1]) * fr;
  const [x, y] = sc(ix, iy);
  const base = Math.max(10, scale * 28);
  const dr = base + base * 0.4 * Math.sin(t);
  oCtx.beginPath(); oCtx.arc(x, y, dr * 2.5, 0, Math.PI * 2);
  oCtx.fillStyle = 'rgba(28,110,243,' + (0.07 + 0.06 * Math.sin(t)) + ')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, dr * 1.5, 0, Math.PI * 2);
  oCtx.fillStyle = 'rgba(28,110,243,' + (0.15 + 0.07 * Math.sin(t)) + ')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, dr, 0, Math.PI * 2);
  oCtx.fillStyle = '#1c6ef3'; oCtx.fill();
  oCtx.strokeStyle = '#fff'; oCtx.lineWidth = 2.5; oCtx.stroke();
}

let progress = 0, playing = false, lastTime = null, speedMult = 1;
let isSeeking = false, pressTimer = null, ctrlVisible = false;

function togglePlay() {
  playing = !playing;
  if (playing) lastTime = null;
  document.getElementById('icon-play').style.display = playing ? 'none' : '';
  document.getElementById('icon-pause').style.display = playing ? '' : 'none';
}
function seekBy(d) {
  progress = Math.max(0, Math.min(1, progress + d));
  document.getElementById('seek-input').value = Math.round(progress * 1000);
  document.getElementById('seek-val').textContent = Math.round(progress * 100) + '%';
}
function onSeek(v) {
  progress = v / 1000;
  document.getElementById('seek-val').textContent = Math.round(progress * 100) + '%';
  lastTime = null;
}
function onSpeed(v) {
  speedMult = parseFloat(v);
  document.getElementById('speed-val').textContent = 'x' + speedMult.toFixed(1);
  lastTime = null;
}
function resetAnim() {
  progress = 0; lastTime = null; playing = false;
  document.getElementById('seek-input').value = 0;
  document.getElementById('seek-val').textContent = '0%';
  document.getElementById('icon-play').style.display = '';
  document.getElementById('icon-pause').style.display = 'none';
}
function toggleCtrl() {
  ctrlVisible = !ctrlVisible;
  document.getElementById('ui-ctrl').style.display = ctrlVisible ? 'block' : 'none';
}

function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts - lastTime; lastTime = ts;
  if (playing && progress < 1 && !isSeeking) {
    progress = Math.min(progress + (dt * speedMult) / DURATION, 1);
    if (progress >= 1) {
      playing = false;
      document.getElementById('icon-play').style.display = '';
      document.getElementById('icon-pause').style.display = 'none';
    }
  }
  if (!isSeeking) {
    document.getElementById('seek-input').value = Math.round(progress * 1000);
    document.getElementById('seek-val').textContent = Math.round(progress * 100) + '%';
  }
  oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const t = Date.now() / 600;
  drawTrackerLine(progress);
  drawBeaconDot(t);
  drawTrackerDot(progress, t + 1.5);
  requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);

const wrapEl = document.getElementById('wrap');
wrapEl.addEventListener('mousedown', function(e) {
  if (e.target.closest('#ui')) return;
  pressTimer = setTimeout(toggleCtrl, 600);
});
wrapEl.addEventListener('mouseup', function() { clearTimeout(pressTimer); });
wrapEl.addEventListener('touchstart', function(e) {
  if (e.target.closest('#ui')) return;
  pressTimer = setTimeout(toggleCtrl, 600);
}, { passive: true });
wrapEl.addEventListener('touchend', function() { clearTimeout(pressTimer); });
document.getElementById('seek-input').addEventListener('mousedown', function() { isSeeking = true; });
document.getElementById('seek-input').addEventListener('mouseup', function() { isSeeking = false; });
document.getElementById('seek-input').addEventListener('touchstart', function() { isSeeking = true; }, { passive: true });
document.getElementById('seek-input').addEventListener('touchend', function() { isSeeking = false; });
</script>
