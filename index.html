<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GPS Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100dvh; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
#wrap { position: relative; width: min(390px,100vw); height: min(844px,100dvh); overflow: hidden; }
canvas { display: block; }
#oc { position: absolute; top: 0; left: 0; }
#ui {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: rgba(28,28,30,0.78);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 20px 20px 0 0;
  padding: 14px 20px max(20px,env(safe-area-inset-bottom));
  z-index: 10;
}
#ui-main { display: flex; align-items: center; justify-content: space-between; }
#ui-left { display: flex; align-items: center; gap: 12px; }
#ui-icon { width: 42px; height: 42px; border-radius: 12px; background: rgba(255,59,48,0.18); border: 1px solid rgba(255,59,48,0.5); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#ui-name { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
#ui-sub { color: #30d158; font-size: 12px; font-weight: 500; margin-top: 2px; }
#ui-right { display: flex; align-items: center; gap: 10px; }
#ui-signal { display: flex; align-items: flex-end; gap: 2px; }
.sb { width: 4px; background: #30d158; border-radius: 2px; }
.pdot { width: 10px; height: 10px; background: #30d158; border-radius: 50%; animation: pg 1.4s ease-in-out infinite; }
@keyframes pg { 0%,100%{box-shadow:0 0 0 0 rgba(48,209,88,0.5)} 60%{box-shadow:0 0 0 6px rgba(48,209,88,0)} }
#ctrl {
  display: none; margin-top: 12px;
  border-top: 0.5px solid rgba(255,255,255,0.12); padding-top: 12px;
}
#ctrl-btns { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; }
.cbtn { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.cbtn:active { background: rgba(255,255,255,0.22); }
#cbtn-play { background: rgba(28,110,243,0.85); width: 48px; height: 48px; }
.crow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.clabel { color: rgba(255,255,255,0.55); font-size: 11px; white-space: nowrap; }
.cval { color: #30d158; font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }
#si { accent-color: #1c6ef3; }
#sp { accent-color: #30d158; }
/* 録画ボタン（操作パネル内） */
#rec-btn {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 10px;
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  font-family: inherit;
  margin-top: 4px;
}
#rec-btn.recording { border-color: rgba(255,59,48,0.7); background: rgba(255,59,48,0.25); }
#rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; }
#rec-btn.recording #rec-dot { animation: rb 1s ease-in-out infinite; }
@keyframes rb { 0%,100%{opacity:1} 50%{opacity:0.2} }

#compass {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 64px;
  height: 64px;
  z-index: 30;
  cursor: grab;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}
#compass.dragging {
  cursor: grabbing;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
}
#compass svg {
  width: 100%;
  height: 100%;
  display: block;
}
#compass-reset {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  margin: 0 12px 10px;
  display: none;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 10px;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 8px;
  text-align: center;
  cursor: pointer;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bc"></canvas>
  <canvas id="oc"></canvas>

  <div id="compass">
    <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="gB" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.24)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
        </radialGradient>
      </defs>
      <rect x="8" y="8" width="224" height="224" rx="44"
        fill="rgba(30,30,45,0.72)" stroke="rgba(255,255,255,0.28)" stroke-width="2"/>
      <rect x="8" y="8" width="224" height="224" rx="44" fill="url(#gB)"/>
      <circle cx="120" cy="120" r="88" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
      <circle cx="120" cy="120" r="74" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
      <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
        <line x1="120" y1="24" x2="120" y2="34"/>
        <line x1="120" y1="206" x2="120" y2="216"/>
        <line x1="24" y1="120" x2="34" y2="120"/>
        <line x1="206" y1="120" x2="216" y2="120"/>
      </g>
      <polygon points="212,120 140,110 148,120 140,130" fill="#ff3b30"/>
      <polygon points="28,120 100,110 92,120 100,130" fill="rgba(255,255,255,0.82)"/>
      <circle cx="120" cy="120" r="11" fill="rgba(15,15,35,0.9)" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
      <circle cx="120" cy="120" r="4.5" fill="#ff3b30"/>
      <text x="222" y="126" fill="#ff3b30" font-size="20" font-weight="800"
        font-family="-apple-system,sans-serif" text-anchor="middle">N</text>
    </svg>
  </div>

  <div id="ui">
    <div id="ui-main">
      <div id="ui-left">
        <div id="ui-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" fill="#ff3b30"/>
            <line x1="12" y1="2" x2="12" y2="6" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <line x1="2" y1="12" x2="6" y2="12" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <line x1="18" y1="12" x2="22" y2="12" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          </svg>
        </div>
        <div>
          <div id="ui-name">GPS TAG 001</div>
          <div id="ui-sub">追跡中</div>
        </div>
      </div>
      <div id="ui-right">
        <div id="ui-signal">
          <div class="sb" style="height:5px"></div>
          <div class="sb" style="height:9px"></div>
          <div class="sb" style="height:13px"></div>
          <div class="sb" style="height:17px"></div>
        </div>
        <div class="pdot"></div>
      </div>
    </div>
    <div id="ctrl">
      <div id="ctrl-btns">
        <button class="cbtn" onclick="seekBy(-0.1)">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M11 19L2 12L11 5V19Z" fill="rgba(255,255,255,0.85)"/><path d="M22 19L13 12L22 5V19Z" fill="rgba(255,255,255,0.85)"/></svg>
        </button>
        <button class="cbtn" id="cbtn-play" onclick="togglePlay()">
          <svg id="ip" width="22" height="22" viewBox="0 0 24 24"><path d="M6 4L18 12L6 20V4Z" fill="white"/></svg>
          <svg id="ipu" width="22" height="22" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="4" height="16" fill="white"/><rect x="15" y="4" width="4" height="16" fill="white"/></svg>
        </button>
        <button class="cbtn" onclick="seekBy(0.1)">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M13 5L22 12L13 19V5Z" fill="rgba(255,255,255,0.85)"/><path d="M2 5L11 12L2 19V5Z" fill="rgba(255,255,255,0.85)"/></svg>
        </button>
        <button class="cbtn" onclick="resetAnim()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12A9 9 0 1 0 5.64 5.64" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round"/><path d="M3 7V12H8" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="crow">
        <span class="clabel">進行</span>
        <input type="range" id="si" min="0" max="1000" value="0" oninput="onSeek(this.value)">
        <span class="cval" id="sv">0%</span>
      </div>
      <div class="crow">
        <span class="clabel">速度</span>
        <input type="range" id="sp" min="1" max="10" value="1" step="0.5" oninput="onSpeed(this.value)">
        <span class="cval" id="spv">x1.0</span>
      </div>
      <button id="compass-reset-btn" onclick="resetCompassPos()" style="width:100%;margin-top:4px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:12px;font-weight:600;padding:8px;cursor:pointer;font-family:inherit;">コンパス位置をリセット</button>
    </div>
  </div>
</div>

  bc.style.width = oc.style.width = cw + 'px';
  bc.style.height = oc.style.height = ch + 'px';
  drawBase();
}

mapImg.onload = function() { drawBase(); };
function drawBase() { bCtx.drawImage(mapImg, 0, 0, bc.width, bc.height); }

function drawLine(pts, progress, full) {
  const n = pts.length;
  const end = full ? n - 1 : progress * (n - 1);
  const fi = Math.floor(end);
  const lw = Math.max(2, scale * 4);
  function segs(w, color, blur) {
    oCtx.strokeStyle = color; oCtx.lineWidth = w;
    oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';
    oCtx.shadowBlur = blur; oCtx.shadowColor = '#4db8ff';
    oCtx.beginPath();
    const [sx, sy] = sc(...pts[0]); oCtx.moveTo(sx, sy);
    for (let i = 1; i <= fi && i < n; i++) {
      const [x, y] = sc(...pts[i]); oCtx.lineTo(x, y);
    }
    if (!full && fi < n - 1) {
      const frac = end - fi;
      const [x0, y0] = sc(...pts[fi]);
      const [x1, y1] = sc(...pts[Math.min(fi + 1, n - 1)]);
      oCtx.lineTo(x0 + (x1 - x0) * frac, y0 + (y1 - y0) * frac);
    }
    oCtx.stroke(); oCtx.shadowBlur = 0;
  }
  segs(lw * 9, 'rgba(28,110,243,0.25)', 24);
  segs(lw * 5, 'rgba(100,180,255,0.55)', 14);
  segs(lw * 2.5, '#cce8ff', 6);
}

function drawBeacon(t) {
  const [x, y] = sc(...BEACON_POS);
  const base = Math.max(10, scale * 28);
  const p = base + base * 0.35 * Math.sin(t);
  oCtx.beginPath(); oCtx.arc(x, y, p*2.8, 0, Math.PI*2);
  oCtx.fillStyle = 'rgba(255,59,48,'+(0.07+0.05*Math.sin(t))+')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, p*1.6, 0, Math.PI*2);
  oCtx.fillStyle = 'rgba(255,59,48,'+(0.15+0.07*Math.sin(t))+')'; oCtx.fill();
  oCtx.beginPath(); oCtx.arc(x, y, p, 0, Math.PI*2);
  oCtx.fillStyle = '#1a0a0a'; oCtx.fill();
  oCtx.strokeStyle = '#ff3b30'; oCtx.lineWidth = 2.5; oCtx.stroke();
  oCtx.strokeStyle = 'rgba(255,59,48,0.5)'; oCtx.lineWidth = 1;
  oCtx.beginPath(); oCtx.moveTo(x-p*1.4,y); oCtx.lineTo(x+p*1.4,y); oCtx.stroke();
  oCtx.beginPath(); oCtx.moveTo(x,y-p*1.4); oCtx.lineTo(x,y+p*1.4); oCtx.stroke();
  oCtx.beginPath(); oCtx.arc(x, y, p*0.28, 0, Math.PI*2);
  oCtx.fillStyle = '#ff3b30'; oCtx.fill();
  const fs = Math.max(9, scale*22);
  oCtx.font = 'bold '+fs+'px Courier New,monospace';
  oCtx.textAlign = 'center';
  const label = 'GPS TAG 001';
  const tw = oCtx.measureText(label).width;
  const ty = y + p + fs*1.8;
  oCtx.fillStyle = 'rgba(0,0,0,0.65)';
  oCtx.beginPath(); oCtx.roundRect(x-tw/2-6, ty-fs, tw+12, fs*1.4, 3); oCtx.fill();
  oCtx.strokeStyle = 'rgba(255,59,48,0.7)'; oCtx.lineWidth = 1; oCtx.stroke();
  oCtx.fillStyle = '#ff3b30'; oCtx.fillText(label, x, ty);
}

function drawTrackerDot(progress, t) {
  const COMBINED = [...PRE_ROUTE, ...TRACKER_ROUTE];
  const n = COMBINED.length;
  const preN = PRE_ROUTE.length;
  const totalProgress = (preN - 1 + progress * (TRACKER_ROUTE.length - 1)) / (n - 1);
  const f = totalProgress * (n-1), i = Math.floor(f), fr = f-i;
  const a = COMBINED[i], b = COMBINED[Math.min(i+1,n-1)];
  const [x, y] = sc(a[0]+(b[0]-a[0])*fr, a[1]+(b[1]-a[1])*fr);
  const base = Math.max(10, scale*28);
  const dr = base + base*0.4*Math.sin(t);
  oCtx.beginPath(); oCtx.arc(x, y, dr, 0, Math.PI*2);
  oCtx.fillStyle = '#1c6ef3'; oCtx.fill();
  oCtx.strokeStyle = '#fff'; oCtx.lineWidth = 2.5; oCtx.stroke();
}

let progress = 0, playing = false, lastTime = null, speedMult = 1;
let isSeeking = false, pressTimer = null, ctrlVisible = false;

function togglePlay() {
  playing = !playing;
  if (playing) lastTime = null;
  document.getElementById('ip').style.display = playing ? 'none' : '';
  document.getElementById('ipu').style.display = playing ? '' : 'none';
}
function seekBy(d) {
  progress = Math.max(0, Math.min(1, progress+d));
  document.getElementById('si').value = Math.round(progress*1000);
  document.getElementById('sv').textContent = Math.round(progress*100)+'%';
}
function onSeek(v) {
  progress = v/1000;
  document.getElementById('sv').textContent = Math.round(progress*100)+'%';
  lastTime = null;
}
function onSpeed(v) {
  speedMult = parseFloat(v);
  document.getElementById('spv').textContent = 'x'+speedMult.toFixed(1);
  lastTime = null;
}
function resetAnim() {
  progress = 0; lastTime = null; playing = false;
  document.getElementById('si').value = 0;
  document.getElementById('sv').textContent = '0%';
  document.getElementById('ip').style.display = '';
  document.getElementById('ipu').style.display = 'none';
}
function toggleCtrl() {
  ctrlVisible = !ctrlVisible;
  document.getElementById('ctrl').style.display = ctrlVisible ? 'block' : 'none';
}


function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = ts-lastTime; lastTime = ts;
  if (playing && progress < 1 && !isSeeking) {
    progress = Math.min(progress+(dt*speedMult)/DURATION, 1);
    if (progress >= 1) {
      playing = false;
      document.getElementById('ip').style.display = '';
      document.getElementById('ipu').style.display = 'none';
    }
  }
  if (!isSeeking) {
    document.getElementById('si').value = Math.round(progress*1000);
    document.getElementById('sv').textContent = Math.round(progress*100)+'%';
  }
  oCtx.clearRect(0, 0, oc.width, oc.height);
  const t = Date.now()/600;
  const COMBINED = [...PRE_ROUTE, ...TRACKER_ROUTE];
  const combinedProgress = (PRE_ROUTE.length-1+progress*(TRACKER_ROUTE.length-1))/(COMBINED.length-1);
  drawLine(COMBINED, combinedProgress, false);
  drawBeacon(t);
  drawTrackerDot(progress, t+1.5);
  requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);

// ===== コンパス ドラッグ移動 =====
(function() {
  const compass = document.getElementById('compass');
  const wrapEl = document.getElementById('wrap');
  let dragging = false, offX = 0, offY = 0;

  const STORAGE_KEY = 'gps_tracker_compass_pos';
  function loadPos() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const p = JSON.parse(saved);
        compass.style.left = p.left;
        compass.style.top = p.top;
        compass.style.right = 'auto';
      }
    } catch(e) {}
  }
  function savePos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        left: compass.style.left,
        top: compass.style.top
      }));
    } catch(e) {}
  }
  window.resetCompassPos = function() {
    compass.style.left = '';
    compass.style.top = '16px';
    compass.style.right = '16px';
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  };

  function clampToWrap(x, y) {
    const wr = wrapEl.getBoundingClientRect();
    const cw = compass.offsetWidth, ch = compass.offsetHeight;
    x = Math.max(0, Math.min(x, wr.width - cw));
    y = Math.max(0, Math.min(y, wr.height - ch));
    return [x, y];
  }

  function startDrag(clientX, clientY) {
    dragging = true;
    compass.classList.add('dragging');
    const rect = compass.getBoundingClientRect();
    offX = clientX - rect.left;
    offY = clientY - rect.top;
  }
  function moveDrag(clientX, clientY) {
    if (!dragging) return;
    const wr = wrapEl.getBoundingClientRect();
    let x = clientX - wr.left - offX;
    let y = clientY - wr.top - offY;
    [x, y] = clampToWrap(x, y);
    compass.style.left = x + 'px';
    compass.style.top = y + 'px';
    compass.style.right = 'auto';
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    compass.classList.remove('dragging');
    savePos();
  }

  compass.addEventListener('mousedown', (e) => { startDrag(e.clientX, e.clientY); e.preventDefault(); });
  document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);

  compass.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    startDrag(t.clientX, t.clientY);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const t = e.touches[0];
    moveDrag(t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', endDrag);

  loadPos();
})();
</script>
